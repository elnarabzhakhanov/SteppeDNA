services:
  - type: web
    name: steppedna-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: STEPPEDNA_API_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "https://steppedna.onrender.com,https://steppedna.vercel.app"
    healthCheckPath: /health
    plan: free

  - type: web
    name: steppedna-frontend
    runtime: static
    buildCommand: echo "Static site - no build needed"
    staticPublishPath: frontend
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    plan: free
