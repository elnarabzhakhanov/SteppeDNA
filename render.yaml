services:
  - type: web
    name: steppedna-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      # API key disabled for competition demo — uncomment for production
      # - key: STEPPEDNA_API_KEY
      #   generateValue: true
      - key: ALLOWED_ORIGINS
        value: "https://steppedna.vercel.app"
      - key: RATE_LIMIT
        value: "60"
      - key: RATE_WINDOW
        value: "60"
    healthCheckPath: /health
    plan: starter
